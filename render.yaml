services:
  - type: web
    name: saas-niche-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn saas_niche.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        scope: build,runtime
      - key: SUPABASE_KEY
        scope: build,runtime
      - key: OLLAMA_BASE_URL
        value: http://localhost:11434
        scope: build,runtime
